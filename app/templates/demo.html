<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ayush Terminology Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', Arial, sans-serif;
            background: linear-gradient(120deg, #f0f4f9 0%, #e0e7ef 100%);
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 700px;
            margin: 40px auto;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 2em 2.5em 2em 2.5em;
        }
        h1 {
            color: #1a237e;
            text-align: center;
            margin-bottom: 0.5em;
        }
        h2 {
            color: #3949ab;
            margin-top: 2em;
        }
        label {
            font-weight: 500;
            color: #333;
        }
        input, select, button {
            margin: 0.5em 0 1em 0;
            padding: 0.6em 1em;
            border-radius: 6px;
            border: 1px solid #b0bec5;
            font-size: 1em;
        }
        button {
            background: #3949ab;
            color: #fff;
            border: none;
            cursor: pointer;
            font-weight: 700;
            transition: background 0.2s;
        }
        button:hover {
            background: #1a237e;
        }
        .result {
            margin-top: 1em;
            border: 1px solid #c5cae9;
            border-radius: 8px;
            padding: 1em;
            background: #f5f7fa;
            font-family: 'Roboto Mono', monospace;
            font-size: 0.98em;
            color: #263238;
            white-space: pre-wrap;
        }
        .flex-row {
            display: flex;
            gap: 1em;
            align-items: center;
        }
        .section {
            margin-bottom: 2em;
        }
        @media (max-width: 600px) {
            .container { padding: 1em; }
            .flex-row { flex-direction: column; gap: 0.2em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ayush Terminology Microservice</h1>
        <div class="section">
            <form id="search-form">
                <div class="flex-row">
                    <label for="search-term">Search Term:</label>
                    <input type="text" id="search-term" required placeholder="e.g. fever, cough, ...">
                    <select id="system">
                        <option value="all">All</option>
                        <option value="namaste">NAMASTE</option>
                        <option value="icd11-tm2">ICD-11 TM2</option>
                        <option value="icd11-biomed">ICD-11 Biomedicine</option>
                        <option value="who-ayurveda">WHO Ayurveda</option>
                    </select>
                    <button type="submit">🔍 Search</button>
                </div>
            </form>
            <div id="search-results" class="result" style="display:none;"></div>
        </div>
        <div class="section">
            <h2>ICD-11 Biomedicine Lookup</h2>
            <form id="icd11-form">
                <div class="flex-row">
                    <label for="icd11-term">ICD-11 Term:</label>
                    <input type="text" id="icd11-term" required placeholder="e.g. fever, diabetes, ...">
                    <button type="submit">🔍 Lookup</button>
                </div>
            </form>
            <div id="icd11-results" class="result" style="display:none;"></div>
        </div>
        <div class="section">
            <form id="translate-form">
                <h2>Translate Code</h2>
                <div class="flex-row">
                    <label for="translate-code">Code:</label>
                    <input type="text" id="translate-code" required placeholder="e.g. NAMASTE or TM2 code">
                    <select id="direction">
                        <option value="namaste-to-tm2">NAMASTE → TM2</option>
                        <option value="tm2-to-namaste">TM2 → NAMASTE</option>
                    </select>
                    <button type="submit">🔄 Translate</button>
                </div>
            </form>
            <div id="translate-result" class="result" style="display:none;"></div>
        </div>
        <div class="section">
            <h2>Problem List Builder</h2>
            <div id="problem-list-table" class="result" style="display:none;"></div>
            <button id="export-btn" style="display:none;">⬇️ Export as FHIR Bundle</button>
            <input type="file" id="import-file" accept="application/json" style="margin-top:1em;">
            <button id="import-btn">⬆️ Import FHIR Bundle</button>
        </div>
    </div>
    <script>
        const API_BASE = "/";
        const AUTH_HEADER = { 'Authorization': 'Bearer demo-token' };
        let problemList = [];

        // UI/UX: Add to Problem List
        function addToProblemList(item) {
            problemList.push(item);
            renderProblemList();
        }

        function renderProblemList() {
            const tableDiv = document.getElementById('problem-list-table');
            if (problemList.length === 0) {
                tableDiv.style.display = 'none';
                document.getElementById('export-btn').style.display = 'none';
                return;
            }
            tableDiv.style.display = 'block';
            document.getElementById('export-btn').style.display = 'inline-block';
            let html = '<b>Problem List (FHIR):</b><table style="width:100%;margin-top:1em;"><tr><th>System</th><th>Code</th><th>Display</th><th>Remove</th></tr>';
            problemList.forEach((item, idx) => {
                html += `<tr><td>${item.system}</td><td>${item.code}</td><td>${item.display || ''}</td><td><button onclick="removeFromProblemList(${idx})">❌</button></td></tr>`;
            });
            html += '</table>';
            tableDiv.innerHTML = html;
        }

        function removeFromProblemList(idx) {
            problemList.splice(idx, 1);
            renderProblemList();
        }

        // Export as FHIR Bundle
        document.getElementById('export-btn').onclick = function() {
            const bundle = {
                resourceType: "Bundle",
                type: "collection",
                entry: problemList.map(item => ({
                    resource: {
                        resourceType: "Condition",
                        code: {
                            coding: [
                                { system: item.system, code: item.code, display: item.display }
                            ]
                        }
                    }
                }))
            };
            const blob = new Blob([JSON.stringify(bundle, null, 2)], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'problem_list_bundle.json';
            a.click();
            URL.revokeObjectURL(url);
        };

        // Import FHIR Bundle
        document.getElementById('import-btn').onclick = function() {
            const fileInput = document.getElementById('import-file');
            if (!fileInput.files.length) return alert('Select a file to import!');
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const bundle = JSON.parse(e.target.result);
                    if (bundle.entry && Array.isArray(bundle.entry)) {
                        problemList = bundle.entry.map(e => {
                            const c = e.resource.code.coding[0];
                            return { system: c.system, code: c.code, display: c.display };
                        });
                        renderProblemList();
                    }
                } catch (err) { alert('Invalid FHIR Bundle!'); }
            };
            reader.readAsText(fileInput.files[0]);
        };

        // Search
        document.getElementById('search-form').onsubmit = async function(e) {
            e.preventDefault();
            const q = document.getElementById('search-term').value;
            const system = document.getElementById('system').value;
            const res = await fetch(`${API_BASE}autocomplete?q=${encodeURIComponent(q)}&system=${system}`, { headers: AUTH_HEADER });
            const data = await res.json();
            const resultsDiv = document.getElementById('search-results');
            if (data && data.length > 0) {
                resultsDiv.style.display = 'block';
                resultsDiv.innerHTML = data.map((item, idx) =>
                    `<div style='margin-bottom:0.5em;padding:0.5em;border-radius:6px;background:#e8eaf6;'>`+
                    `<b>System:</b> <span style='color:#3949ab;'>${item.system}</span> &nbsp;`+
                    `<b>Code:</b> <span style='color:#1a237e;'>${item.code}</span> &nbsp;`+
                    `<b>Display:</b> ${item.display || ''}<br>`+
                    (item.icd11_tm2 ? `<b>ICD-11 TM2:</b> ${item.icd11_tm2}<br>` : '')+
                    (item.icd11_biomed ? `<b>ICD-11 Biomedicine:</b> ${item.icd11_biomed}<br>` : '')+
                    (item.who_ayurveda ? `<b>WHO Ayurveda:</b> ${item.who_ayurveda}<br>` : '')+
                    `<button onclick='addToProblemList(${JSON.stringify(item)})' style='margin-top:0.5em;'>➕ Add to Problem List</button>`+
                    `</div>`
                ).join('');
            } else {
                resultsDiv.style.display = 'block';
                resultsDiv.innerHTML = '<i>No results found.</i>';
            }
        };

        // Translate
        document.getElementById('translate-form').onsubmit = async function(e) {
            e.preventDefault();
            const code = document.getElementById('translate-code').value;
            const direction = document.getElementById('direction').value;
            const res = await fetch(`${API_BASE}translate?code=${encodeURIComponent(code)}&direction=${direction}`, { headers: AUTH_HEADER });
            const data = await res.json();
            const resultDiv = document.getElementById('translate-result');
            if (data && !data.error) {
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `<b>Source System:</b> ${data.source_system}<br><b>Source Code:</b> ${data.source_code}<br><b>Target System:</b> ${data.target_system}<br><b>Target Code:</b> ${data.target_code}<br><b>Display:</b> ${data.display}`;
            } else {
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `<i>${data.error || 'No mapping found.'}</i>`;
            }
        };

        // ICD-11 Biomedicine Lookup
        document.getElementById('icd11-form').onsubmit = async function(e) {
            e.preventDefault();
            const q = document.getElementById('icd11-term').value;
            const res = await fetch(`${API_BASE}autocomplete?q=${encodeURIComponent(q)}&system=icd11-biomed`, { headers: AUTH_HEADER });
            const data = await res.json();
            const resultsDiv = document.getElementById('icd11-results');
            if (data && data.length > 0) {
                resultsDiv.style.display = 'block';
                resultsDiv.innerHTML = data.map(item =>
                    `<b>Code:</b> <span style='color:#1a237e;'>${item.code}</span><br>`+
                    `<b>Display:</b> ${item.display || ''}<br>`
                ).join('<hr style="border:0;border-top:1px solid #e0e0e0;">');
            } else {
                resultsDiv.style.display = 'block';
                resultsDiv.innerHTML = '<i>No results found.</i>';
            }
        };
    </script>
</body>
</html>
